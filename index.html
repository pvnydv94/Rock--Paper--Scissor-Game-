<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone Paper Scissor Game </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1> Stone Paper Scissor Game </h1>
    <div class="choices">
        <div class="choice">
            <img id="stone" src="ROCK.jpg"/>
        </div>
        <div class="choice">
            <img id="scissor" src="SCISSOR.jpg"/>
        </div>
        <div class="choice">
            <img id="paper" src="hnd.jpg"/>
        </div>
    </div>
    <div class="scoreboard">
        <div class="score">
            <p id="userscore">0</p>
            <p> You</p>
        </div>
        <div class="score">
            <p id="computerscore">0</p>
            <p>Computer </p>
        </div>
    </div>
    <div class="msg-container">
        <p id="msg"> Play your move</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
